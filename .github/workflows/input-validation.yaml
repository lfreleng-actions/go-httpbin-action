---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: 'Input Validation Tests 🔒'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch: {}
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  input-validation-tests:
    name: 'Input Validation/Security Tests'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@aa81113fe43792f29f939c79ea47a04801cf5342'  # v0.4.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout local action'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Set up Docker'
        run: |
          # Ensure Docker is running
          sudo systemctl start docker
          sudo systemctl enable docker

          # Add current user to docker group (may require re-login in some
          # environments)
          sudo usermod -aG docker "$USER" || true

      - name: 'Run Input Validation Tests'
        run: |
          # Run the comprehensive test suite
          ./tests/test-input-validation.sh --verbose

      - name: 'Cleanup Test Containers (if any remain)'
        if: always()
        run: |
          # Clean up any containers that might have been left behind
          echo "Cleaning up any remaining test containers..."
          docker ps -a --filter "name=test-" --format "{{.Names}}" | \
          while read -r container; do
            if [[ -n "$container" ]]; then
              echo "Removing container: $container"
              docker stop "$container" 2>/dev/null || true
              docker rm "$container" 2>/dev/null || true
            fi
          done

          # Clean up any test images that might have been created
          docker images --filter "dangling=true" -q | \
          while read -r image; do
            if [[ -n "$image" ]]; then
              echo "Removing dangling image: $image"
              docker rmi "$image" 2>/dev/null || true
            fi
          done

      - name: 'Check for Security Vulnerabilities'
        if: always()
        run: |
          echo "Checking for common security issues..."

          # Check if any test containers are still running (they shouldn't be)
          running_containers=$(docker ps --filter "name=test-" \
            --format "{{.Names}}" | wc -l)
          if [[ $running_containers -gt 0 ]]; then
            echo "❌ WARNING: Test containers still running after tests"
            docker ps --filter "name=test-"
            exit 1
          else
            echo "✅ No test containers running after cleanup"
          fi

          # Verify no suspicious processes were started
          if pgrep -f "evil.com\|malicious" >/dev/null; then
            echo "❌ WARNING: Suspicious processes detected"
            pgrep -f "evil.com\|malicious" -l
            exit 1
          else
            echo "✅ No suspicious processes detected"
          fi

      - name: 'Generate Test Report'
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "## Input Validation Test Report"
            echo ""
            echo "**Test Run**: $(date)"
            echo "**Workflow**: ${GITHUB_WORKFLOW}"
            echo "**Run ID**: ${RUN_ID}"
            echo "**Commit**: ${COMMIT_SHA}"
            echo ""
          } > test-report.md

          if [[ -f test-results.log ]]; then
            {
              echo "### Test Results"
              echo '```'
              cat test-results.log
              echo '```'
            } >> test-report.md
          fi

          {
            echo "### Docker Environment"
            echo '```'
            docker --version
            docker info --format '{{.ServerVersion}}'
            echo '```'
          } >> test-report.md

          cat test-report.md

      - name: 'Upload Test Artifacts'
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: input-validation-test-results
          path: |
            test-report.md
            test-results.log
          retention-days: 30
